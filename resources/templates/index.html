<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Restaurant Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">Restaurant MS</a>
        <div class="navbar-nav">
            <a class="nav-link" th:href="@{/admin}">Admin</a>
            <a class="nav-link" th:href="@{/orders}">Orders</a>
            <a class="nav-link" th:href="@{/reservations}">Reservations</a>
            <a class="nav-link" th:href="@{/customer}">Customers</a>
        </div>
    </div>
</nav>
<div class="container py-5">
    <div class="p-5 bg-white rounded shadow-sm">
        <h1 class="display-6">Restaurant Management System</h1>
        <p class="lead mb-4">Reduced Spring Boot MVC project with 4 members, 4 modules, and 4 design patterns.</p>
        <p class="text-muted" th:text="${dbStatus}"></p>
        <div class="row g-3 mt-2">
            <div class="col-md-3"><a class="btn btn-primary w-100" th:href="@{/admin}">Admin Module</a></div>
            <div class="col-md-3"><a class="btn btn-success w-100" th:href="@{/orders}">Order Module</a></div>
            <div class="col-md-3"><a class="btn btn-warning w-100" th:href="@{/reservations}">Reservation Module</a></div>
            <div class="col-md-3"><a class="btn btn-info w-100" th:href="@{/customer}">Customer Module</a></div>
        </div>
    </div>
</div>
</body>
</html>
