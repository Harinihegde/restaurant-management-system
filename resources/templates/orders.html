<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Orders</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4">
    <h2 class="mb-3">Order & Payment Module</h2>
    <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>
    <div class="row g-4">
        <div class="col-lg-4">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h5>Create Order</h5>
                    <form method="get" th:action="@{/orders/save}">
                        <div class="mb-3"><input class="form-control" name="itemSummary" placeholder="Items" required></div>
                        <div class="mb-3"><input class="form-control" type="number" name="quantity" value="1" min="1"></div>
                        <div class="mb-3"><input class="form-control" type="number" step="0.01" name="totalAmount" placeholder="Total amount" required></div>
                        <div class="mb-3">
                            <select class="form-select" name="discountType">
                                <option value="none">No Discount</option>
                                <option value="percentage">Percentage</option>
                                <option value="flat">Flat</option>
                            </select>
                        </div>
                        <button class="btn btn-success" type="submit">Create Order</button>
                    </form>
                </div>
            </div>
            <div class="card shadow-sm mt-4">
                <div class="card-body">
                    <h5>Process Payment</h5>
                    <form method="get" th:action="@{/orders/payment}">
                        <div class="mb-3"><input class="form-control" type="number" name="orderId" placeholder="Order ID" required></div>
                        <div class="mb-3">
                            <select class="form-select" name="paymentType">
                                <option value="CASH">Cash</option>
                                <option value="CARD">Card</option>
                            </select>
                        </div>
                        <div class="mb-3"><input class="form-control" name="lastFour" maxlength="4" placeholder="Card last 4 digits"></div>
                        <button class="btn btn-primary" type="submit">Process Payment</button>
                    </form>
                </div>
            </div>
        </div>
        <div class="col-lg-8">
            <div class="card shadow-sm">
                <div class="card-body">
                    <form class="row g-2 mb-3" method="get" th:action="@{/orders}">
                        <div class="col"><input class="form-control" name="keyword" th:value="${keyword}" placeholder="Search by status"></div>
                        <div class="col-auto"><button class="btn btn-outline-secondary">Search</button></div>
                    </form>
                    <table class="table table-bordered">
                        <thead><tr><th>ID</th><th>Items</th><th>Total</th><th>Status</th></tr></thead>
                        <tbody>
                        <tr th:each="order : ${orders}">
                            <td th:text="${order.id}"></td>
                            <td th:text="${order.itemSummary}"></td>
                            <td th:text="${order.totalAmount}"></td>
                            <td th:text="${order.status}"></td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
            <div class="card shadow-sm mt-4">
                <div class="card-body">
                    <h5>Payment History</h5>
                    <table class="table table-bordered">
                        <thead><tr><th>ID</th><th>Order ID</th><th>Type</th><th>Status</th></tr></thead>
                        <tbody>
                        <tr th:if="${payments.isEmpty()}">
                            <td colspan="4" class="text-muted text-center">No payments processed yet.</td>
                        </tr>
                        <tr th:each="payment : ${payments}">
                            <td th:text="${payment.id}"></td>
                            <td th:text="${payment.orderId}"></td>
                            <td th:text="${payment.paymentType}"></td>
                            <td th:text="${payment.paymentStatus}"></td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
