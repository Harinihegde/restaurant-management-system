<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Customer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4">
    <h2 class="mb-3">Customer Module</h2>
    <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>
    <div class="row g-4">
        <div class="col-lg-4">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h5>Add Customer</h5>
                    <form th:action="@{/customer/save}" th:object="${customerForm}" method="post">
                        <div class="mb-3"><input class="form-control" th:field="*{name}" placeholder="Name" required></div>
                        <div class="mb-3"><input class="form-control" th:field="*{email}" placeholder="Email" required></div>
                        <div class="mb-3">
                            <select class="form-select" th:field="*{membershipType}">
                                <option value="BASIC">Basic</option>
                                <option value="LOYALTY">Loyalty</option>
                            </select>
                        </div>
                        <button class="btn btn-info" type="submit">Save Customer</button>
                    </form>
                </div>
            </div>
        </div>
        <div class="col-lg-8">
            <div class="card shadow-sm">
                <div class="card-body">
                    <table class="table table-striped">
                        <thead><tr><th>Name</th><th>Email</th><th>Membership</th><th>Benefits</th></tr></thead>
                        <tbody>
                        <tr th:each="customer : ${customers}">
                            <td th:text="${customer.name}"></td>
                            <td th:text="${customer.email}"></td>
                            <td th:text="${customer.membershipType}"></td>
                            <td th:text="${@customerFacade.getBenefits(customer)}"></td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
