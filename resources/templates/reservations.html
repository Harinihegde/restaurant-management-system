<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Reservations</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4">
    <h2 class="mb-3">Reservation Module</h2>
    <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>
    <div class="row g-4">
        <div class="col-lg-4">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h5>Create Reservation</h5>
                    <form method="get" th:action="@{/reservations/save}">
                        <div class="mb-3"><input class="form-control" name="guestName" placeholder="Guest name" required></div>
                        <div class="mb-3"><input class="form-control" type="number" min="1" name="guestCount" placeholder="Guest count" required></div>
                        <div class="mb-3"><input class="form-control" type="datetime-local" name="reservationTime" required></div>
                        <button class="btn btn-warning" type="submit">Reserve</button>
                    </form>
                </div>
            </div>
        </div>
        <div class="col-lg-8">
            <div class="card shadow-sm">
                <div class="card-body">
                    <form class="row g-2 mb-3" method="get" th:action="@{/reservations}">
                        <div class="col"><input class="form-control" name="keyword" th:value="${keyword}" placeholder="Search by status"></div>
                        <div class="col-auto"><button class="btn btn-outline-secondary">Search</button></div>
                    </form>
                    <table class="table table-hover">
                        <thead><tr><th>ID</th><th>Guest</th><th>Guests</th><th>Status</th></tr></thead>
                        <tbody>
                        <tr th:each="reservation : ${reservations}">
                            <td th:text="${reservation.id}"></td>
                            <td th:text="${reservation.guestName}"></td>
                            <td th:text="${reservation.guestCount}"></td>
                            <td th:text="${reservation.status}"></td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
