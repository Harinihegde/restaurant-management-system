<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Menu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4">
    <h2 class="mb-3">Admin Module</h2>
    <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>
    <div class="row g-4">
        <div class="col-lg-5">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h5>Add Menu Item</h5>
                    <form th:action="@{/admin/save}" th:object="${menuForm}" method="post">
                        <div class="mb-3"><input class="form-control" th:field="*{itemName}" placeholder="Item name" required></div>
                        <div class="mb-3"><input class="form-control" th:field="*{category}" placeholder="Category" required></div>
                        <div class="mb-3"><input class="form-control" type="number" step="0.01" th:field="*{price}" placeholder="Price" required></div>
                        <button class="btn btn-primary" type="submit">Save</button>
                    </form>
                </div>
            </div>
        </div>
        <div class="col-lg-7">
            <div class="card shadow-sm">
                <div class="card-body">
                    <form class="row g-2 mb-3" method="get" th:action="@{/admin}">
                        <div class="col"><input class="form-control" name="keyword" th:value="${keyword}" placeholder="Search menu"></div>
                        <div class="col-auto"><button class="btn btn-outline-secondary">Search</button></div>
                    </form>
                    <table class="table table-striped">
                        <thead><tr><th>Item</th><th>Category</th><th>Price</th></tr></thead>
                        <tbody>
                        <tr th:each="menu : ${menus}">
                            <td th:text="${menu.itemName}"></td>
                            <td th:text="${menu.category}"></td>
                            <td th:text="${menu.price}"></td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
